<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="newapp">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>newapp</title>
  <link rel="manifest" href="manifest.json">

  <!-- Final "No-Fail" Icon Fix -->
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons|Material+Icons+Rounded|Material+Icons+Outlined&display=block" rel="stylesheet">
  <style>
    /* Aggressive Global Override: This targets EVERY element Flutter might use for icons */
    * {
      --material-font: 'Material Icons Rounded', 'Material Icons', 'MaterialIcons', 'Material Symbols Rounded';
    }
    
    flt-icon, flt-span, span, i, .material-icons, [class*="material-icons"] {
      font-family: var(--material-font) !important;
      -webkit-font-feature-settings: "liga" 1 !important;
      font-feature-settings: "liga" 1 !important;
    }
  </style>
</head>
<body>
  <script>
    window.addEventListener('load', function(ev) {
      // Modern Flutter bootstrap with forced HTML renderer
      _flutter.loader.load({
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine({
            renderer: "html",
          }).then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
  <!-- Load the bootstrap script which defines _flutter.loader -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
